name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core + agent (needed for typecheck of dependent packages)
        run: pnpm --filter @lexmanh/shed-core --filter @lexmanh/shed-agent build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build all
        run: pnpm build

      - name: Publish packages
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-alpha"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            DIST_TAG="beta"
          else
            DIST_TAG="latest"
          fi
          echo "Publishing with dist-tag: $DIST_TAG"
          for pkg in packages/core packages/cli packages/agent packages/mcp-server; do
            echo "--- Publishing $pkg ---"
            (cd "$pkg" && npm publish --provenance --access public --tag "$DIST_TAG")
          done
        env:
          NODE_AUTH_TOKEN: ''
          NPM_CONFIG_PROVENANCE: true
