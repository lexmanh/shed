name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core + agent (needed for typecheck of dependent packages)
        run: pnpm --filter @lexmanh/shed-core --filter @lexmanh/shed-agent build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build all
        run: pnpm build

      - name: Publish packages
        run: |
          echo "npm: $(npm --version), pnpm: $(pnpm --version)"
          # Until v1.0.0 stable ships, every release uses `latest` tag.
          # Post-1.0, reintroduce `beta`/`rc` dist-tags for pre-releases.
          pnpm -r publish --provenance --no-git-checks --tag latest
