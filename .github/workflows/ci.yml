name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core + agent (needed for typecheck of dependent packages)
        run: pnpm --filter @lexmanh/shed-core --filter @lexmanh/shed-agent build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          CI: true
          NODE_ENV: test

      - name: Build
        run: pnpm build

  safety-audit:
    name: Safety Rule Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for forbidden destructive syscalls outside SafetyChecker
        shell: bash
        run: |
          # Fail if fs.rm / fs.unlink / rimraf appear anywhere outside the
          # SafetyChecker module. Test files are excluded — test cleanup is
          # expected to use fs primitives.
          #
          # Allowlist:
          #   packages/core/src/safety/safety-checker.ts  — the ONE authorised location
          #   *.test.ts                                    — test fixture cleanup
          if grep -rEn \
              "(fs\.(rm|unlink|rmdir)|rimraf|promises\.(rm|unlink|rmdir))" \
              packages/ \
              --include="*.ts" \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
            | grep -v "packages/core/src/safety/safety-checker\.ts" \
            | grep -v "\.test\.ts" \
            | grep -vE "^\S+:[0-9]+:\s*(//|\*)" ; then
            echo ""
            echo "❌  Destructive syscall found outside SafetyChecker!"
            echo "    All destructive operations must go through"
            echo "    @lexmanh/shed-core SafetyChecker.execute()."
            echo "    See CLAUDE.md rule 1."
            exit 1
          fi
          echo "✅  No forbidden destructive syscalls found."
