name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

        > **Data loss?** Email the maintainer directly before filing publicly.

  - type: input
    id: shed-version
    attributes:
      label: Shed version
      placeholder: "shed --version"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: "macOS 15.1 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "node --version"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command run
      placeholder: "shed clean ~/projects --execute"
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Full output
      description: Run with `--verbose` for more detail
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (project structure, edge case, etc.)
